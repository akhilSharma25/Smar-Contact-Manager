<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Signup</title>

</head>
<body>

<div id="content" class="page-wrapper">
    <style>
        /* Container Layout */
        .page-wrapper { display: flex; justify-content: center; padding: 20px; margin-top: 20px; }
        .signup-card {
            width: 100%; max-width: 500px; padding: 30px; background: #fff;
            border-top: 10px solid #1d4ed8; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Typography */
        .title { font-size: 1.5rem; font-weight: bold; color: #111; margin-bottom: 0.5rem; }
        .subtitle { color: #666; margin-bottom: 20px; }

        /* Form Styling */
        .form-group { margin-bottom: 15px; }
        .label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500; color: #333; }
        .input-box {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;
            font-size: 0.9rem; box-sizing: border-box;
        }
        .input-box:focus { outline: none; border-color: #1d4ed8; }

        /* Errors */
        .error { color: #dc2626; font-size: 0.8rem; margin-top: 5px; }

        /* Buttons */
        .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; color: #fff; font-weight: bold; }
        .btn-submit { background-color: #1f2937; }
        .btn-submit:hover { background-color: #374151; }
        .btn-reset { background-color: #9a3412; }
        .btn-reset:hover { background-color: #c2410c; }
    </style>
    <div class="signup-card">

        <div data-th-replace="~{message::messagebox}"></div>

        <h5 class="title">Signup Here</h5>
        <p class="subtitle">Start managing contacts on cloud ...</p>

        <form data-th-action="@{'/do-register'}" method="post" data-th-object="${userForm}" novalidate>

            <div class="form-group">
                <label for="name" class="label">Name</label>
                <input type="text" id="name" data-th-field="*{name}" class="input-box" placeholder="Enter here" required />
                <p data-th-if="${#fields.hasErrors('name')}" data-th-errors="*{name}" class="error"></p>
            </div>

            <div class="form-group">
                <label for="email" class="label">Email</label>
                <input type="email" id="email" data-th-field="*{email}" class="input-box" placeholder="name@flowbite.com" required />
                <p data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}" class="error"></p>
            </div>

            <div class="form-group">
                <label for="password" class="label">New Password</label>
                <input type="password" id="password" data-th-field="*{password}" class="input-box" required />
                <p data-th-if="${#fields.hasErrors('password')}" data-th-errors="*{password}" class="error"></p>
            </div>

            <div class="form-group">
                <label for="phone" class="label">Contact Number</label>
                <input type="text" id="phone" data-th-field="*{phoneNumber}" class="input-box" required />
                <p data-th-if="${#fields.hasErrors('phoneNumber')}" data-th-errors="*{phoneNumber}" class="error"></p>
            </div>

            <div class="form-group">
                <label for="about" class="label">Write something about yourself</label>
                <textarea id="about" data-th-field="*{about}" rows="4" class="input-box" placeholder="Write here..."></textarea>
                <p data-th-if="${#fields.hasErrors('about')}" data-th-errors="*{about}" class="error"></p>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn btn-submit">Signup</button>
                <button type="reset" class="btn btn-reset">Reset</button>
            </div>
        </form>
    </div>
</div>

<script th:fragment="script">
    console.log("Signup page loaded");
</script>
</body>
</html>
