<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Home Page</title>
</head>
<body>

<div id="content">
    <style>
        .login-container {
            text-align: center;
            margin-top: 50px;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-login {
            background-color: #111827;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #374151;
        }
    </style>

    <div class="login-container">
        <div data-th-replace="~{message::messagebox}"></div>

        <button class="btn-login">
            Login
        </button>
    </div>
</div>

<script th:fragment="script">
    console.log("Home page loaded");
</script>
</body>
</html>
