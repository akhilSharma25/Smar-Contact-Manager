<div id="content">
    <style>
        /* 1. Page Wrapper: Sidebar aur Navbar ka gap manage karne ke liye */
        .profile-page-wrapper {
            padding-top: 80px;      /* Navbar ki height ke liye top space */
            padding-left: 260px;    /* Sidebar ki width ke liye left space */
            min-height: 100vh;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-bottom: 50px;
        }

        /* 2. Profile Card Styling */
        .profile-card {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        /* 3. Image Fix: Taki fatne ki jagah center mein fit rahe */
        .profile-img-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            position: relative;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4f46e5;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        /* 4. Text & Labels */
        .user-name { font-size: 1.8rem; font-weight: 700; color: #1e293b; margin-bottom: 5px; }
        .user-email { color: #64748b; margin-bottom: 15px; font-size: 1rem; }

        .info-badge {
            background: #eef2ff;
            color: #4338ca;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 25px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
            text-align: left;
        }

        .detail-item label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .detail-item p { font-size: 0.95rem; font-weight: 600; color: #334155; margin: 5px 0 0; }

        /* Dark Mode Support (Optional but safe) */
        body.dark-mode .profile-card { background: #1e293b; border-color: #334155; }
        body.dark-mode .user-name { color: #f8fafc; }
        body.dark-mode .detail-item p { color: #cbd5e1; }

        /* Mobile Responsive: Sidebar hide hone par margin hatana */
        @media (max-width: 640px) {
            .profile-page-wrapper {
                padding-left: 0;
                padding-top: 70px;
            }
        }
    </style>

    <div class="profile-page-wrapper">
        <div class="profile-card" th:if="${loggedInUser}">

            <div class="profile-img-container">
                <img
                        data-th-src="${loggedInUser.profilePic}"
                        src="/images/default-profile.png"
                        onerror="this.onerror=null; this.src='/images/default-profile.png';"
                        style="width: 100%; height: 100%; object-fit: cover;"
                        alt="Profile"
                />
            </div>

            <h2 class="user-name" data-th-text="${loggedInUser.name}">Akhil Sharma</h2>
            <p class="user-email" data-th-text="${loggedInUser.email}">email@example.com</p>

            <div class="info-badge">
                Account created using <span th:text="${loggedInUser.provider}">Google</span>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <label>Phone</label>
                    <p data-th-text="${loggedInUser.phoneNumber != null ? loggedInUser.phoneNumber : 'N/A'}">N/A</p>
                </div>
                <div class="detail-item">
                    <label>Status</label>
                    <p data-th-text="${loggedInUser.emailVerified ? 'Verified' : 'Unverified'}">Verified</p>
                </div>
            </div>

            <div style="margin-top: 25px; text-align: left;">
                <label style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">About</label>
                <p style="margin-top: 8px; color: #475569; font-style: italic; line-height: 1.6;"
                   data-th-text="${loggedInUser.about != null ? loggedInUser.about : 'Hi there! I am using Smart Contact Manager.'}">
                    About user...
                </p>
            </div>

        </div>
    </div>
</div>
