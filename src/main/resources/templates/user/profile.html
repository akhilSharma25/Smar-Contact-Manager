<div id="content">
    <style>
        /* 1. Page Wrapper: Full Height aur Column Layout */
        .profile-page-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            flex-grow: 1;
        }

        /* 2. Content Adjustment: Sidebar aur Navbar ke liye */
        .profile-page-wrapper {
            flex-grow: 1;
            padding-top: 100px;     /* Navbar space + extra gap */
            padding-left: 30px;     /* Sidebar margin fixed via flex or margin */
            margin-left: 260px;     /* Sidebar width */
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-bottom: 50px;
        }

        /* 3. Profile Card Styling */
        .profile-card {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .profile-img-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4f46e5;
        }

        .user-name { font-size: 1.8rem; font-weight: 700; color: #1e293b; margin-bottom: 5px; }
        .user-email { color: #64748b; margin-bottom: 15px; font-size: 1rem; }

        .info-badge {
            background: #eef2ff;
            color: #4338ca;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 25px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
            text-align: left;
        }

        .detail-item label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
        .detail-item p { font-size: 0.95rem; font-weight: 600; color: #334155; margin: 5px 0 0; }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .profile-page-wrapper {
                margin-left: 0;
                padding-left: 15px;
                padding-right: 15px;
            }
        }
    </style>

    <div class="profile-page-container">
        <!-- 1. Navbar Include (Missing part) -->
        <div th:if="${loggedInUser}">
            <div data-th-replace="~{user/user_navbar :: user-navbar}"></div>
        </div>

        <div class="main-layout">
            <!-- 2. Sidebar Include -->
            <div th:if="${loggedInUser}">
                <div data-th-replace="~{user/sidebar :: sidebar}"></div>
            </div>

            <!-- 3. Profile Content -->
            <div class="profile-page-wrapper">
                <div class="profile-card" th:if="${loggedInUser}">

                    <div class="profile-img-container">
                        <img
                                data-th-src="${loggedInUser.profilePic}"
                                src="/images/default-profile.png"
                                onerror="this.onerror=null; this.src='/images/default-profile.png';"
                                alt="Profile"
                        />
                    </div>

                    <h2 class="user-name" data-th-text="${loggedInUser.name}">User Name</h2>
                    <p class="user-email" data-th-text="${loggedInUser.email}">email@example.com</p>

                    <div class="info-badge">
                        Account created using <span th:text="${loggedInUser.provider}">Provider</span>
                    </div>

                    <div class="details-grid">
                        <div class="detail-item">
                            <label>Phone</label>
                            <p data-th-text="${loggedInUser.phoneNumber != null ? loggedInUser.phoneNumber : 'N/A'}">N/A</p>
                        </div>
                        <div class="detail-item">
                            <label>Status</label>
                            <p data-th-text="${loggedInUser.emailVerified ? 'Verified' : 'Unverified'}">Verified</p>
                        </div>
                    </div>

                    <div style="margin-top: 25px; text-align: left;">
                        <label style="font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;">About</label>
                        <p style="margin-top: 8px; color: #475569; font-style: italic; line-height: 1.6;"
                           data-th-text="${loggedInUser.about != null ? loggedInUser.about : 'Hi there! I am using Smart Contact Manager.'}">
                            About user...
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
