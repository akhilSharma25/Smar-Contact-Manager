<aside data-th-fragment="sidebar" id="logo-sidebar" class="scm-sidebar">
    <style>
        /* Sidebar Main Container */
    .scm-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        /* Navbar ke thik niche se content dikhane ke liye */
        z-index: 1000 !important;
        width: 260px;
        height: 100vh;
        padding-top: 64px; /* Navbar ki fixed height jitna gap */
        background-color: #ffffff;
        border-right: 1px solid #e5e7eb;
        transition: transform 0.3s ease;
    }

        /* Profile Section */
        .sidebar-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 15px;
            background-color: #f9fafb;
            border-radius: 12px;
            text-align: center;
        }

        .sidebar-profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6366f1;
            margin-bottom: 10px;
        }

        .user-name-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #111827;
            margin: 0;
        }

        .welcome-msg {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 4px;
        }

        /* Navigation List */
        .sidebar-nav {
            list-style: none;
            padding: 10px 15px;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link i {
            width: 20px;
            margin-right: 12px;
            color: #6b7280;
            font-size: 1.1rem;
        }

        /* Hover Effects */
        .nav-link:hover {
            background-color: #eef2ff;
            color: #4338ca;
        }

        .nav-link:hover i {
            color: #4338ca;
        }

        /* Logout Link Specific */
        .logout-link {
            color: #dc2626 !important;
            margin-top: 20px;
            border-top: 1px solid #f3f4f6;
            padding-top: 20px;
        }

        .logout-link:hover {
            background-color: #fef2f2;
        }

        .logout-link i {
            color: #dc2626;
        }

        /* --- DARK MODE --- */
        body.dark-mode .scm-sidebar {
            background-color: #1e293b;
            border-right: 1px solid #334155;
        }

        body.dark-mode .sidebar-profile {
            background-color: #334155;
        }

        body.dark-mode .user-name-text {
            color: #f8fafc;
        }

        body.dark-mode .nav-link {
            color: #cbd5e1;
        }

        body.dark-mode .nav-link:hover {
            background-color: #1e1b4b;
            color: #818cf8;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .scm-sidebar {
                transform: translateX(-100%);
            }
            .scm-sidebar.open {
                transform: translateX(0);
            }
        }
    </style>

    <div class="h-full overflow-y-auto">
        <div class="sidebar-profile">
            <img
                    data-th-src="${loggedInUser.profilePic}"
                    src="/images/default-profile.png"
                    onerror="this.onerror=null; this.src='/images/default-profile.png';"
                    style="width: 100%; height: 100%; object-fit: cover;"
                    alt="Profile"
            />
            <p class="user-name-text" data-th-text="${loggedInUser.name}">User Name</p>
            <p class="welcome-msg">Welcome to SCM</p>
        </div>

        <ul class="sidebar-nav">
            <li class="nav-item">
                <a data-th-href="@{'/user/dashboard'}" class="nav-link">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a data-th-href="@{'/user/profile'}" class="nav-link">
                    <i class="fa-solid fa-user"></i> Profile
                </a>
            </li>
            <li class="nav-item">
                <a data-th-href="@{'/user/contacts/add'}" class="nav-link">
                    <i class="fa-solid fa-plus"></i> Add Contact
                </a>
            </li>
            <li class="nav-item">
                <a data-th-href="@{'/user/contacts'}" class="nav-link">
                    <i class="fa-solid fa-address-book"></i> View Contacts
                </a>
            </li>

            <li class="nav-item logout-item">
                <a data-th-href="@{'/logout'}" class="nav-link logout-link">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </li>
        </ul>
    </div>
</aside>
