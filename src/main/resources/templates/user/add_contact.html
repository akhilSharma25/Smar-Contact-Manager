<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Add Contact | SCM</title>
</head>
<body>
<div id="content">
    <style>
        /* 1. Layout Wrapper: Sidebar aur Navbar space fix */
        .add-contact-wrapper {
            padding-top: 80px;      /* Navbar space */
            padding-left: 260px;    /* Sidebar space */
            min-height: 100vh;
            background-color: #f4f7fe;
            padding-bottom: 40px;
        }

        /* 2. Form Card Styling */
        .contact-card {
            background: #ffffff;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        .form-header {
            margin-bottom: 25px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }

        .form-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .form-header p { color: #64748b; font-size: 0.9rem; margin-top: 5px; }

        /* 3. Input Groups */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .form-control {
            width: 100%;
            padding: 10px 10px 10px 40px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea.form-control { padding-left: 15px; } /* Icons not needed inside textareas */

        /* 4. Buttons */
        .btn-container { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
        .btn-add { background: #111827; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-reset { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; padding: 10px 25px; border-radius: 8px; cursor: pointer; }

        /* Error Text */
        .error-msg { color: #dc2626; font-size: 0.8rem; margin-top: 5px; }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .add-contact-wrapper { padding-left: 15px; padding-right: 15px; }
        }
    </style>

    <div class="add-contact-wrapper">
        <div th:if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: sidebar}"></div>
        </div>

        <div class="contact-card">
            <div data-th-replace="~{message::messagebox}"></div>
            <div class="form-header">
                <h1>Add New Contact</h1>
                <p>Store your contacts securely on the cloud and connect instantly.</p>
            </div>

            <form
                    data-th-action="@{'/user/contacts/add'}"
                    data-th-object="${contactForm}"
                    method="post"
                    enctype="multipart/form-data"
            >
                <div class="form-group">
                    <label>Contact Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" data-th-field="*{name}" class="form-control" placeholder="Full Name" />
                    </div>
                    <p class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" data-th-field="*{email}" class="form-control" placeholder="example@mail.com" />
                        </div>
                        <p class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" data-th-field="*{phoneNumber}" class="form-control" placeholder="1234567890" />
                        </div>
                        <p class="error-msg" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contact Address</label>
                    <textarea data-th-field="*{address}" rows="3" class="form-control" placeholder="Full Address"></textarea>
                    <p class="error-msg" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></p>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea data-th-field="*{description}" rows="2" class="form-control" placeholder="Brief about this contact"></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Website Link</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-earth-americas"></i>
                            <input type="text" data-th-field="*{websiteLink}" class="form-control" placeholder="https://example.com" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>LinkedIn Link</label>
                        <div class="input-wrapper">
                            <i class="fa-brands fa-linkedin"></i>
                            <input type="text" data-th-field="*{linkedInLink}" class="form-control" placeholder="https://linkedin.com/in/user" />
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contact Image</label>
                    <input id="image_file_input" type="file" data-th-field="*{contactImage}"
                           style="padding: 5px; font-size: 0.8rem; border: 1px dashed #d1d5db; width: 100%; border-radius: 8px;" />
                    <img id="upload_image_preview" src="" class="max-h-52 mx-auto rounded-lg shadow m-3" style="display: none; max-width: 200px;" alt="" />
                </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
                    <input type="checkbox" data-th-field="*{favorite}" style="width: 18px; height: 18px; cursor: pointer;" />
                    <label style="margin: 0; cursor: pointer;">Add to Favorites?</label>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-add">Save Contact</button>
                    <button type="reset" class="btn-reset">Reset Form</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:fragment="script">
    console.log("Add Contact Page: JS Loaded");

    document.querySelector("#image_file_input").addEventListener("change", function (event) {
        let file = event.target.files[0];

        if (file) {
            let reader = new FileReader();
            reader.onload = function () {
                let preview = document.querySelector("#upload_image_preview");
                // Image set karna
                preview.setAttribute("src", reader.result);
                // Image ko dikhana (pehle se hidden hogi)
                preview.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    });
</script>
</body>
</html>
