<div id="content">
    <style>
        /* Dashboard Wrapper */
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
            background-color: #f8fafc;
        }

        /* Main Area Adjustment */
        .main-content {
            flex-grow: 1;
            margin-left: 260px; /* Sidebar width */
            padding-top: 90px;  /* Navbar height + gap */
            padding-left: 30px;
            padding-right: 30px;
            text-align: center;
        }

        .welcome-title {
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .welcome-text {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        /* Dark mode compatibility */
        body.dark-mode .dashboard-wrapper { background-color: #0f172a; }
        body.dark-mode .welcome-title { color: #f8fafc; }
        body.dark-mode .welcome-text { color: #94a3b8; }

        @media (max-width: 640px) {
            .main-content { margin-left: 0; padding-top: 80px; }
        }
        .dashboard-wrapper {
            display: flex;
            flex-direction: column; /* Taki Navbar upar rahe aur baaki content niche */
            min-height: 100vh;
        }

        .main-layout {
            display: flex; /* Sidebar aur Main Content ke liye */
            flex-grow: 1;
        }
    </style>

    <div class="dashboard-wrapper">
        <!-- 1. NAVBAR YAHAN AAYEGI (Ye missing thi) -->
        <div th:if="${loggedInUser}">
            <div data-th-replace="~{user/user_navbar :: user-navbar}"></div>
        </div>

        <div class="main-layout">
            <!-- 2. SIDEBAR -->
            <div th:if="${loggedInUser}">
                <div data-th-replace="~{user/sidebar :: sidebar}"></div>
            </div>

            <!-- 3. MAIN CONTENT -->
            <div class="main-content">
                <h1 class="welcome-title">Welcome to Dashboard</h1>
                <p class="welcome-text">
                    Hello <span th:text="${loggedInUser != null ? loggedInUser.name : 'User'}" style="font-weight: bold; color: #4f46e5;">User</span>!
                    Glad to see you back.
                </p>

                <div style="background: white; padding: 40px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                    <p style="color: #475569;">You can start managing your contacts from the sidebar.</p>
                </div>
            </div>
        </div>
    </div>
</div>
