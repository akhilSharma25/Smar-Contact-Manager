<!DOCTYPE html>
<html
        lang="en"
        th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
<head>
    <title data-th-text="${loggedInUser.name}+' | Dashboard'">
        Dashboard
    </title>
</head>
<body>
<div id="content">
    <!-- Internal CSS for Dashboard Layout -->
    <style>
        .dashboard-container {
          display: flex;
          min-height: 100vh;
        }

        .main-content {
          flex-grow: 1;
          padding: 80px 20px 20px 20px; /* Top padding for navbar space */
          text-align: center;
          background-color: var(--bg-color); /* Uses your global background */
          color: var(--text-color);
        }

        .welcome-title {
          font-size: 3rem;
          margin-bottom: 10px;
          color: #1e293b;
        }

        /* Dark mode support for title */
        body.dark-mode .welcome-title {
          color: #f8fafc;
        }

        .welcome-text {
          font-size: 1.2rem;
          color: #64748b;
        }
    </style>

    <div class="dashboard-container">
        <!-- Sidebar: Sirf tab dikhega jab user logged in ho -->
        <div th:if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: sidebar}"></div>
        </div>

        <!-- Main Body Content -->
        <div class="main-content">
            <h1 class="welcome-title">Welcome to Dashboard</h1>
            <p class="welcome-text">
                Hello <span th:text="${loggedInUser.name}" style="font-weight: bold; color: #4f46e5;">User</span>!
                Glad to see you back.
            </p>
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Consequatur, ratione!
            </p>
        </div>
    </div>
</div>

<script th:fragment="script">
    console.log("This is profile page");
</script>
</body>
</html>
