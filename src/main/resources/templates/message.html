<div th:fragment="messagebox" th:if="${session.message}" th:object="${session.message}">

    <style>
        .my-alert {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: sans-serif;
            font-size: 14px;
        }
        /* Types */
        .red { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
        .blue { color: #004085; background-color: #cce5ff; border-color: #b8daff; }
        .green { color: #155724; background-color: #d4edda; border-color: #c3e6cb; }

        .alert-icon { width: 20px; height: 20px; margin-right: 10px; }
    </style>

    <div data-th-if="${session.message}" class="my-alert"
         th:classappend="*{type == 'red' ? 'red' : (type == 'blue' ? 'blue' : 'green')}"
         role="alert">

        <svg class="alert-icon" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
        </svg>

        <span th:text="*{content}"></span>

        <th:block th:text="${@sessionHelper.removeMessage()}"></th:block>
    </div>
</div>
